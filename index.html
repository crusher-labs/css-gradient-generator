<!DOCTYPE html>
<html lang="en"
      data-default-theme="minimal"
      data-theme-lock="minimal"
      data-default-mode="light"
      data-default-brand="#0ea5e9">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CSS Gradient Generator</title>
    <link rel="icon" href="data:,">
    <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' 'unsafe-inline' https://cdn.jsdelivr.net https://cdnjs.cloudflare.com https://unpkg.com; style-src 'self' 'unsafe-inline' https://cdn.jsdelivr.net https://fonts.googleapis.com; font-src https://fonts.gstatic.com; img-src 'self' data: blob:; media-src 'self' blob:; connect-src 'self' https://unpkg.com; worker-src 'self' blob:; object-src 'none'; base-uri 'self';">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/crusher-ui-kit@0.1.6/dist/crusher-ui.min.css" integrity="sha384-EIv1tRpD4TjJA0H6sAVfeiJJyJt6DwPxbTYWSsJzylRFMkqMI6xVARApOqqWm5iI" crossorigin="anonymous">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/crusher-ui-kit@0.1.6/dist/themes/minimal.css" integrity="sha384-QYfQeMTJKWZuoEgfBv8ZvJwG12qr6YW8SF6ziK3aHL9luxKjnoswdj/yek7EwpJN" crossorigin="anonymous">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/crusher-ui-kit@0.1.6/dist/static/tool-shell.css" integrity="sha384-+mIUnYgeB+0Qf10OjT3tSbT2al2Y8erQfw/uws4os7AxVKNLYeEUW5zHUehGBTVq" crossorigin="anonymous">
    <script defer src="https://cdn.jsdelivr.net/npm/crusher-ui-kit@0.1.6/dist/static/tool-shell.js" integrity="sha384-gNDnPKn5AoF0e4Q555fGbM+snO+UCP3/z4ErG3cyS/Akusg/bzTO+AYmG1WAMnab" crossorigin="anonymous"></script>
    <style>
        body { font-family: 'Inter', sans-serif; }

        .tool-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(min(100%, 18rem), 1fr));
            gap: var(--crusher-spacing-8);
            max-width: 56rem;
            margin-inline: auto;
        }
        .tool-section { padding: var(--crusher-spacing-6); }
        .tool-section h2 {
            margin: 0 0 var(--crusher-spacing-4);
            font-size: var(--crusher-font-size-xl);
            color: var(--crusher-text-primary);
        }
        .tool-block { margin-bottom: var(--crusher-spacing-6); }
        .tool-label {
            display: block;
            margin-bottom: var(--crusher-spacing-2);
            font-size: var(--crusher-font-size-sm);
            font-weight: 500;
            color: var(--crusher-text-secondary);
        }

        .tool-colors { display: grid; gap: var(--crusher-spacing-3); }
        .tool-color-stop { display: flex; align-items: center; gap: var(--crusher-spacing-3); }
        .tool-color-swatch {
            inline-size: 3rem; block-size: 3rem;
            border: none; padding: 0;
            border-radius: var(--crusher-radius-md);
            cursor: pointer;
            background: transparent;
        }
        .tool-color-swatch::-webkit-color-swatch { border-radius: var(--crusher-radius-md); border: 2px solid var(--crusher-border-primary); }
        .tool-color-swatch::-moz-color-swatch { border-radius: var(--crusher-radius-md); border: 2px solid var(--crusher-border-primary); }
        .tool-color-hex { flex-grow: 1; padding: var(--crusher-spacing-2) var(--crusher-spacing-3); }
        .tool-color-remove {
            background: transparent; border: 0; padding: var(--crusher-spacing-2);
            color: var(--crusher-text-secondary); cursor: pointer; line-height: 0;
            border-radius: var(--crusher-radius-md);
        }
        .tool-color-remove:hover { color: var(--crusher-color-brand-primary); }
        .tool-color-remove[hidden] { visibility: hidden; }

        .tool-add-btn {
            margin-top: var(--crusher-spacing-3);
            inline-size: 100%;
            padding: var(--crusher-spacing-2) var(--crusher-spacing-4);
            font-size: var(--crusher-font-size-sm); font-weight: 600;
        }

        .tool-angle-row { display: flex; justify-content: space-between; align-items: center; margin-bottom: var(--crusher-spacing-2); }
        .tool-angle-row .tool-label { margin-bottom: 0; }
        .tool-angle-slider { inline-size: 100%; }
        .tool-angle-value {
            font-size: var(--crusher-font-size-sm); font-family: monospace;
            padding: var(--crusher-spacing-1) var(--crusher-spacing-2);
            border-radius: var(--crusher-radius-md);
            background: var(--crusher-background-muted);
            color: var(--crusher-text-primary);
        }

        .tool-code-wrap { position: relative; }
        textarea.crusher-tool-control {
            min-block-size: 7rem;
            padding: var(--crusher-spacing-3) calc(var(--crusher-spacing-3) + 2rem) var(--crusher-spacing-3) var(--crusher-spacing-3);
            font-family: monospace; font-size: var(--crusher-font-size-sm); resize: none;
        }
        .tool-copy-btn {
            position: absolute; inset-block-start: var(--crusher-spacing-2); inset-inline-end: var(--crusher-spacing-2);
            background: transparent; border: 0; padding: var(--crusher-spacing-1);
            color: var(--crusher-text-secondary); cursor: pointer; line-height: 0;
            border-radius: var(--crusher-radius-md);
        }
        .tool-copy-btn:hover { color: var(--crusher-color-brand-primary); }
        .tool-copy-feedback {
            position: absolute; inset-block-end: var(--crusher-spacing-2); inset-inline-end: var(--crusher-spacing-2);
            font-size: var(--crusher-font-size-xs); color: var(--crusher-color-brand-primary);
        }

        #gradient-preview {
            inline-size: 100%;
            min-block-size: 16rem;
            border: 2px solid var(--crusher-border-primary);
            border-radius: var(--crusher-radius-xl);
            box-shadow: var(--crusher-shadow-lg);
            transition: background var(--crusher-motion-duration-fast) var(--crusher-motion-easing-standard);
        }
    </style>
</head>
<body class="crusher-tool-page">

    <main class="crusher-tool-shell">
        <header class="crusher-tool-header">
            <h1 class="crusher-tool-title">CSS Gradient Generator</h1>
            <p class="crusher-tool-lede">Create and customize beautiful gradients with ease.</p>
        </header>

        <div class="tool-grid">
            <section class="crusher-tool-surface tool-section">
                <h2>Controls</h2>

                <div class="tool-block">
                    <label class="tool-label">Colors</label>
                    <div id="colors-container" class="tool-colors"></div>
                    <button id="add-color" type="button" class="crusher-tool-action tool-add-btn">+ Add Color</button>
                </div>

                <div class="tool-block">
                    <div class="tool-angle-row">
                        <label for="angle-slider" class="tool-label">Angle</label>
                        <span id="angle-value" class="tool-angle-value">90&deg;</span>
                    </div>
                    <input type="range" id="angle-slider" min="0" max="360" value="90" class="tool-angle-slider">
                </div>

                <div>
                    <label for="css-code" class="tool-label">Generated CSS</label>
                    <div class="tool-code-wrap">
                        <textarea id="css-code" readonly class="crusher-tool-control"></textarea>
                        <button id="copy-code" type="button" class="tool-copy-btn" title="Copy CSS" aria-label="Copy CSS">
                            <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" fill="currentColor" viewBox="0 0 16 16" aria-hidden="true">
                                <path fill-rule="evenodd" d="M4 2a2 2 0 0 1 2-2h8a2 2 0 0 1 2 2v8a2 2 0 0 1-2 2H6a2 2 0 0 1-2-2V2Zm2-1a1 1 0 0 0-1 1v8a1 1 0 0 0 1 1h8a1 1 0 0 0 1-1V2a1 1 0 0 0-1-1H6ZM2 5a1 1 0 0 0-1 1v8a1 1 0 0 0 1 1h8a1 1 0 0 0 1-1v-1h1v1a2 2 0 0 1-2 2H2a2 2 0 0 1-2-2V6a2 2 0 0 1 2-2h1v1H2Z"/>
                            </svg>
                        </button>
                        <span id="copy-feedback" class="tool-copy-feedback"></span>
                    </div>
                </div>
            </section>

            <div id="gradient-preview"></div>
        </div>
    </main>

    <a href="https://tools.muhammadhassaanjaved.com/" id="hub-bubble" class="crusher-tool-fab" title="View All Tools" target="_blank" rel="noopener noreferrer">
        <svg xmlns="http://www.w3.org/2000/svg" width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
            <rect x="3" y="3" width="7" height="7"></rect>
            <rect x="14" y="3" width="7" height="7"></rect>
            <rect x="14" y="14" width="7" height="7"></rect>
            <rect x="3" y="14" width="7" height="7"></rect>
        </svg>
    </a>

    <template id="remove-icon">
        <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" fill="currentColor" viewBox="0 0 16 16" aria-hidden="true">
            <path d="M5.5 5.5A.5.5 0 0 1 6 6v6a.5.5 0 0 1-1 0V6a.5.5 0 0 1 .5-.5zm2.5 0a.5.5 0 0 1 .5.5v6a.5.5 0 0 1-1 0V6a.5.5 0 0 1 .5-.5zm3 .5a.5.5 0 0 0-1 0v6a.5.5 0 0 0 1 0V6z"/>
            <path fill-rule="evenodd" d="M14.5 3a1 1 0 0 1-1 1H13v9a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V4h-.5a1 1 0 0 1-1-1V2a1 1 0 0 1 1-1H6a1 1 0 0 1 1-1h2a1 1 0 0 1 1 1h3.5a1 1 0 0 1 1 1v1zM4.118 4 4 4.059V13a1 1 0 0 0 1 1h6a1 1 0 0 0 1-1V4.059L11.882 4H4.118zM2.5 3V2h11v1h-11z"/>
        </svg>
    </template>

    <crusher-style-switcher
      default-theme="minimal"
      default-brand="#0ea5e9"
      hide-themes
      hide-theme-color>
        <svg slot="mode-light-icon" xmlns="http://www.w3.org/2000/svg" width="22" height="22" viewBox="0 0 512 512" fill="currentColor" aria-hidden="true"><path d="M361.5 1.2c5 2.1 8.6 6.6 9.6 11.9L391 121l107.9 19.8c5.3 1 9.8 4.6 11.9 9.6s1.5 10.7-1.6 15.2L446.9 256l62.3 90.3c3.1 4.5 3.7 10.2 1.6 15.2s-6.6 8.6-11.9 9.6L391 391 371.1 498.9c-1 5.3-4.6 9.8-9.6 11.9s-10.7 1.5-15.2-1.6L256 446.9l-90.3 62.3c-4.5 3.1-10.2 3.7-15.2 1.6s-8.6-6.6-9.6-11.9L121 391 13.1 371.1c-5.3-1-9.8-4.6-11.9-9.6s-1.5-10.7 1.6-15.2L65.1 256 2.8 165.7c-3.1-4.5-3.7-10.2-1.6-15.2s6.6-8.6 11.9-9.6L121 121 140.9 13.1c1-5.3 4.6-9.8 9.6-11.9s10.7-1.5 15.2 1.6L256 65.1 346.3 2.8c4.5-3.1 10.2-3.7 15.2-1.6zM160 256a96 96 0 1 1 192 0 96 96 0 1 1 -192 0zm224 0a128 128 0 1 0 -256 0 128 128 0 1 0 256 0z"/></svg>
        <svg slot="mode-dark-icon" xmlns="http://www.w3.org/2000/svg" width="22" height="22" viewBox="0 0 384 512" fill="currentColor" aria-hidden="true"><path d="M223.5 32C100 32 0 132.3 0 256S100 480 223.5 480c60.6 0 115.5-24.2 155.8-63.4c5-4.9 6.3-12.5 3.1-18.7s-10.1-9.7-17-8.5c-9.8 1.7-19.8 2.6-30.1 2.6c-96.9 0-175.5-78.8-175.5-176c0-65.8 36-123.1 89.3-153.3c6.1-3.5 9.2-10.5 7.7-17.3s-7.3-11.9-14.3-12.5c-6.3-.5-12.6-.8-19-.8z"/></svg>
    </crusher-style-switcher>
    <script type="module" src="https://cdn.jsdelivr.net/npm/crusher-ui-kit@0.1.6/dist/crusher-ui.standalone.esm.js" integrity="sha384-RkuNGzCebUwZ5RZDFSKGQ7sDaUpdPfDxO088yXDMPM5CvJ4eBy2Jf/UhLwGay/4K" crossorigin="anonymous"></script>

    <script>
        // DOM Elements
        const colorsContainer = document.getElementById('colors-container');
        const addColorBtn = document.getElementById('add-color');
        const angleSlider = document.getElementById('angle-slider');
        const angleValue = document.getElementById('angle-value');
        const gradientPreview = document.getElementById('gradient-preview');
        const cssCode = document.getElementById('css-code');
        const copyCodeBtn = document.getElementById('copy-code');
        const copyFeedback = document.getElementById('copy-feedback');
        const removeIconTpl = document.getElementById('remove-icon');

        // Initial State
        let colors = [
            { id: Date.now() + 1, value: '#818cf8' },
            { id: Date.now() + 2, value: '#38bdf8' }
        ];
        let angle = 90;

        function buildColorStop(color) {
            const row = document.createElement('div');
            row.className = 'tool-color-stop';

            const swatch = document.createElement('input');
            swatch.type = 'color';
            swatch.value = color.value;
            swatch.dataset.id = String(color.id);
            swatch.className = 'color-input tool-color-swatch';

            const hex = document.createElement('input');
            hex.type = 'text';
            hex.value = color.value;
            hex.dataset.id = String(color.id);
            hex.className = 'hex-input crusher-tool-control tool-color-hex';

            const remove = document.createElement('button');
            remove.type = 'button';
            remove.dataset.id = String(color.id);
            remove.className = 'remove-color tool-color-remove';
            remove.title = 'Remove Color';
            remove.setAttribute('aria-label', 'Remove Color');
            if (colors.length <= 2) remove.hidden = true;
            remove.appendChild(removeIconTpl.content.cloneNode(true));

            row.appendChild(swatch);
            row.appendChild(hex);
            row.appendChild(remove);
            return row;
        }

        function renderColorStops() {
            colorsContainer.replaceChildren();
            for (const color of colors) {
                colorsContainer.appendChild(buildColorStop(color));
            }
            attachColorEventListeners();
        }

        function generateGradient() {
            const colorStops = colors.map(c => c.value).join(', ');
            const gradientString = `linear-gradient(${angle}deg, ${colorStops})`;

            gradientPreview.style.background = gradientString;
            cssCode.value = `background: ${colors[0].value};\nbackground: ${gradientString};`;
            angleValue.textContent = `${angle}°`;
        }

        function updateColor(id, newValue) {
            const color = colors.find(c => c.id === id);
            if (color) {
                color.value = newValue;
                renderColorStops();
                generateGradient();
            }
        }

        function addColor() {
            const randomColor = '#' + Math.floor(Math.random()*16777215).toString(16).padStart(6, '0');
            colors.push({ id: Date.now(), value: randomColor });
            renderColorStops();
            generateGradient();
        }

        function removeColor(id) {
            if (colors.length > 2) {
                colors = colors.filter(c => c.id !== id);
                renderColorStops();
                generateGradient();
            }
        }

        function attachColorEventListeners() {
            document.querySelectorAll('.color-input').forEach(input => {
                input.addEventListener('input', (e) => updateColor(Number(e.target.dataset.id), e.target.value));
            });
            document.querySelectorAll('.hex-input').forEach(input => {
                input.addEventListener('input', (e) => {
                    if (/^#[0-9A-F]{6}$/i.test(e.target.value)) {
                         updateColor(Number(e.target.dataset.id), e.target.value);
                    }
                });
            });
            document.querySelectorAll('.remove-color').forEach(button => {
                button.addEventListener('click', (e) => removeColor(Number(e.currentTarget.dataset.id)));
            });
        }

        angleSlider.addEventListener('input', (e) => {
            angle = e.target.value;
            generateGradient();
        });

        addColorBtn.addEventListener('click', addColor);

        copyCodeBtn.addEventListener('click', async () => {
            try {
                await navigator.clipboard.writeText(cssCode.value);
            } catch {
                cssCode.select();
                document.execCommand('copy');
            }
            copyFeedback.textContent = 'Copied!';
            setTimeout(() => { copyFeedback.textContent = ''; }, 2000);
        });

        renderColorStops();
        generateGradient();
    </script>
</body>
</html>
